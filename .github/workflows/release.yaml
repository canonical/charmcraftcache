name: Release to PyPI

on:
  push:
    branches:
      - main

concurrency:
  # Prevent race conditions (if multiple commits have been pushed since the last release)
  group: dpw-release-python-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-tests:
    name: Tests
    uses: ./.github/workflows/ci.yaml
    permissions:
      contents: read

  release-part1:
    name: Release to PyPI (part 1)
    needs:
      - ci-tests
    uses: canonical/data-platform-workflows/.github/workflows/release_python_package_part1.yaml@v48.0.4
    permissions:
      actions: read  # Needed for GitHub API call to get workflow version
      contents: write  # Needed to create git tag

  # Separate job needed to workaround https://github.com/pypi/warehouse/issues/11096
  release-trusted-publishing:
    name: Release to PyPI (trusted publishing)
    needs:
      - release-part1
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
      deployment: true
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.release-part1.outputs.artifact-name }}
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
    permissions:
      id-token: write  # Needed for PyPI trusted publishing

  release-part2:
    name: Release to PyPI (part 2)
    needs:
      - release-part1
      - release-trusted-publishing
    uses: canonical/data-platform-workflows/.github/workflows/release_python_package_part2.yaml@v48.0.4
    with:
      git-tag: ${{ needs.release-part1.outputs.git-tag }}
    permissions:
      contents: write  # Needed to create GitHub release
